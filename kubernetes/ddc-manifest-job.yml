apiVersion: v1
kind: ServiceAccount
metadata:
  name: dremio-ddc
  namespace: default

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dremio-ddc
subjects:
- kind: ServiceAccount
  name: dremio-ddc
  namespace: default
roleRef:
  # "roleRef" specifies the binding to a Role / ClusterRole
  kind: ClusterRole #this must be Role or ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: batch/v1
kind: Job
metadata:
  name: dremio-ddc
  namespace: default
spec:
  template:
    spec:
      serviceAccountName: dremio-ddc
      automountServiceAccountToken: true
      containers:
        - name: dremio-ddc
          image: dremiops.azurecr.io/dremio-ddc:v4.0.1
          imagePullPolicy: Always
          env:
            - name: DREMIO_KUBERNETES_NAMESPACE
              value: "default"
            - name: DREMIO_DROPZONE_URL
              value: "PLEASE_SET"
            - name: DREMIO_QUERY_NUMBER_DAYS
              value: "30"
            - name: DREMIO_QUERY_PERF_NUMBER_DAYS
              value: "30"
            - name: DREMIO_LOGS_NUMBER_DAYS
              value: "1"
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "4Gi"
              cpu: "2"
          volumeMounts:
            - mountPath: "/data"
              name: ddc-data-volume
      volumes:
        - name: ddc-data-volume
          ephemeral:
            volumeClaimTemplate:
              spec:
                accessModes: [ "ReadWriteOnce" ]
                resources:
                  requests:
                    storage: 256Gi
      restartPolicy: Never
